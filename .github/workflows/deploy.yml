name: Canlı demoyu yayınla

# Her main push'unda tek dosyalık kendine yeten sürümü derleyip GitHub Pages'e
# yayınlar. Böylece demo cihazdan bağımsız, sürekli erişilebilir olur.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek yayın; yenisi eskisini iptal eder.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıklar
        run: npm ci

      - name: Derle ve tek dosyaya paketle
        run: |
          npm run build
          node scripts/bundle-artifact.mjs

      - name: Yayın klasörünü hazırla
        # Kendine yeten artifact'i index.html olarak koy; Pages onu kök adreste
        # sunar. Dış kaynak istemediği için alt-yol sorunu olmaz.
        run: |
          mkdir -p _site
          cp dist/petri-artifact.html _site/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
